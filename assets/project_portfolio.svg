<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="300">
  <defs>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Theme Gradients -->
    <linearGradient id="theme-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
  </defs>

  <style>
    .card-border {
      fill: #0c0b16;
      stroke: #221e3f;
      stroke-width: 1.5;
      rx: 16;
      transition: all 0.3s ease;
    }
    .card-border:hover {
      stroke: #6366F1;
    }
    .floating-terminal {
      animation: term-float 4.2s infinite ease-in-out;
    }
    .floating-brackets {
      animation: brackets-float 3.5s infinite ease-in-out;
    }
    @keyframes term-float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes brackets-float {
      0%, 100% { transform: translateY(0px) scale(0.95); opacity: 0.7; }
      50% { transform: translateY(-6px) scale(1.05); opacity: 1; }
    }
    .tech-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #c9d1d9;
      background-color: #141226;
      border: 1px solid #221e3f;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: bold;
      color: #a5b4fc;
      background-color: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      margin-right: 6px;
    }
  </style>

  <!-- Card Background -->
  <rect width="848" height="298" x="1" y="1" class="card-border" />

  <!-- Vertical Divider -->
  <line x1="520" y1="20" x2="520" y2="280" stroke="#221e3f" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Left Column: Details (foreignObject) -->
  <foreignObject x="25" y="25" width="470" height="250">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #c9d1d9;
      user-select: none;
    ">
      <h3 style="color: #ffffff; font-size: 20px; margin: 0 0 10px 0; font-weight: 800; display: flex; align-items: center; gap: 8px;">
        ✨ Personal Portfolio
      </h3>
      
      <div style="margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 4px;">
        <span class="badge">Developer Portfolio</span>
        <span class="badge">React &amp; Vite</span>
        <span class="badge">CSS Grid Layouts</span>
        <span class="badge">Form Handling</span>
      </div>

      <ul style="margin: 0; padding-left: 20px; font-size: 13px; line-height: 22px; color: #8b949e; list-style-type: square;">
        <li style="margin-bottom: 8px;">Interactive web developer portfolio showcasing personal details, core skills, featured projects, and accomplishments.</li>
        <li style="margin-bottom: 8px;">Premium layout built using modern CSS grid/flexbox paradigms and fluid glassmorphic UI widgets.</li>
        <li>Integrated and validated contact form with direct links to GitHub repositories and LinkedIn profiles.</li>
      </ul>
    </div>
  </foreignObject>

  <!-- Right Column: Animated 3D Graphic (scaled and translated) -->
  <g transform="translate(585, -20) scale(2.2)">
    <!-- Under-shadow -->
    <ellipse cx="40" cy="80" rx="20" ry="4" fill="rgba(0, 0, 0, 0.35)" />

    <!-- 3D Isometric Terminal Block -->
    <g class="floating-terminal" style="transform-origin: 40px 52px;">
      <!-- Left Face (Darker) -->
      <polygon points="22,42 40,50 40,72 22,64" fill="#141223" stroke="#6366F1" stroke-width="1.2" stroke-linejoin="round" />
      
      <!-- Perspective Green/Red Code Lines on Left Face -->
      <line x1="25" y1="48" x2="35" y2="52" stroke="#10B981" stroke-width="1.2" stroke-linecap="round" />
      <line x1="25" y1="54" x2="38" y2="60" stroke="#10B981" stroke-width="1.2" stroke-linecap="round" />
      <line x1="25" y1="60" x2="32" y2="63" stroke="#FF3366" stroke-width="1.2" stroke-linecap="round" />

      <!-- Right Face (Medium) -->
      <polygon points="40,50 58,42 58,64 40,72" fill="#252142" stroke="#6366F1" stroke-width="1.2" stroke-linejoin="round" />
      
      <!-- Perspective Orange/Blue/White Code Lines on Right Face -->
      <line x1="43" y1="55" x2="53" y2="51" stroke="#FFE082" stroke-width="1.2" stroke-linecap="round" />
      <line x1="43" y1="61" x2="55" y2="56" stroke="#33CCFF" stroke-width="1.2" stroke-linecap="round" />
      <line x1="43" y1="67" x2="50" y2="64" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" />

      <!-- Top Face (Terminal Screen Header) -->
      <polygon points="40,34 58,42 40,50 22,42" fill="#1c1a30" stroke="#6366F1" stroke-width="1.2" stroke-linejoin="round" />
      
      <!-- macOS Style Header Dots in 3D Isometric View -->
      <circle cx="28" cy="40" r="1" fill="#FF3366" />
      <circle cx="32" cy="41.8" r="1" fill="#FFCA28" />
      <circle cx="36" cy="43.5" r="1" fill="#27C93F" />
    </g>

    <!-- Floating 3D Brackets Above (Animated) -->
    <g class="floating-brackets" style="transform-origin: 40px 22px;">
      <path d="M 28,26 L 25,22 L 28,18" fill="none" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 52,26 L 55,22 L 52,18" fill="none" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" />
      <line x1="42" y1="16" x2="38" y2="28" stroke="#33CCFF" stroke-width="1.5" stroke-linecap="round" filter="url(#glow)" />
    </g>
  </g>

  <!-- Right Column Bottom: Tech Stack Pills -->
  <foreignObject x="545" y="210" width="280" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    ">
      <span class="tech-pill">React</span>
      <span class="tech-pill">Vite</span>
      <span class="tech-pill">CSS Grid</span>
      <span class="tech-pill">HTML5</span>
      <span class="tech-pill">JS</span>
      <span class="tech-pill">HSL Themes</span>
    </div>
  </foreignObject>
</svg>
