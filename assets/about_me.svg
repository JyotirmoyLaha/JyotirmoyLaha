<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="100%" height="220">
  <style>
    .card-border {
      fill: #0c0b16;
      stroke: #221e3f;
      stroke-width: 1.5;
      rx: 16;
      transition: all 0.3s ease;
    }
    .card-border:hover {
      stroke: #8B5CF6;
    }
    .terminal-header {
      fill: #141226;
      stroke: #221e3f;
      stroke-width: 1;
    }
    .term-text {
      font-family: 'Fira Code', Consolas, Monaco, 'Ubuntu Mono', monospace;
      font-size: 13px;
      line-height: 22px;
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      width: 0;
      box-sizing: border-box;
      border-right: 2px solid transparent;
    }
    .prompt {
      color: #3b82f6;
      font-weight: bold;
    }
    .command {
      color: #00f2fe;
    }
    .content-text {
      color: #adbac7;
    }
    
    /* Typewriter keyframes */
    .line1 {
      animation: type 1.2s steps(25, end) forwards, blink-caret 0.6s step-end infinite, hide-cursor 0s 1.2s forwards;
    }
    .line2 {
      animation: type 1.6s steps(45, end) 1.2s forwards, blink-caret 0.6s step-end infinite 1.2s, hide-cursor 0s 2.8s forwards;
    }
    .line3 {
      animation: type 1.6s steps(45, end) 2.8s forwards, blink-caret 0.6s step-end infinite 2.8s, hide-cursor 0s 4.4s forwards;
    }
    .line4 {
      animation: type 1.6s steps(45, end) 4.4s forwards, blink-caret 0.6s step-end infinite 4.4s, hide-cursor 0s 6.0s forwards;
    }
    .line5 {
      animation: type 1.8s steps(50, end) 6.0s forwards, blink-caret 0.6s step-end infinite 6.0s, hide-cursor 0s 7.8s forwards;
    }
    .line6 {
      animation: type 1.2s steps(20, end) 7.8s forwards, blink-caret 0.6s step-end infinite 7.8s;
    }
    
    @keyframes type {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes blink-caret {
      from, to { border-right-color: transparent; }
      50% { border-right-color: #3b82f6; }
    }
    @keyframes hide-cursor {
      to { border-right-color: transparent; }
    }
  </style>

  <!-- Card Background -->
  <rect width="848" height="218" x="1" y="1" class="card-border" />

  <!-- Terminal Header Bar -->
  <path d="M 1,13 C 1,5 5,1 13,1 L 835,1 C 843,1 847,5 847,13 L 847,30 L 1,30 Z" class="terminal-header" />
  
  <!-- macOS dots -->
  <circle cx="20" cy="15" r="4" fill="#FF5F56" />
  <circle cx="32" cy="15" r="4" fill="#FFBD2E" />
  <circle cx="44" cy="15" r="4" fill="#27C93F" />
  <text x="425" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="bold" fill="#6c7a89" text-anchor="middle">about_me.sh</text>

  <!-- Terminal Body content via foreignObject -->
  <foreignObject x="20" y="45" width="810" height="165">
    <div xmlns="http://www.w3.org/1999/xhtml" style="margin: 0; padding: 0;">
      <!-- Line 1: Command Prompt -->
      <div style="margin-bottom: 5px;">
        <span class="term-text line1"><span class="prompt">jyotirmoy@laha:~$</span> <span class="command">cat about_me.txt</span></span>
      </div>
      <!-- Line 2: BCA Student -->
      <div style="margin-bottom: 5px;">
        <span class="term-text line2 content-text">🎓 BCA Student (2nd Year) with a strong foundation in Python, DSA, and Web Dev.</span>
      </div>
      <!-- Line 3: Builder Mindset -->
      <div style="margin-bottom: 5px;">
        <span class="term-text line3 content-text">🚀 Builder Mindset — Passionate about building real-world projects.</span>
      </div>
      <!-- Line 4: Philosophy -->
      <div style="margin-bottom: 5px;">
        <span class="term-text line4 content-text">🧠 Philosophy — Learn by building, breaking things, and rebuilding better.</span>
      </div>
      <!-- Line 5: Fun Fact -->
      <div style="margin-bottom: 5px;">
        <span class="term-text line5 content-text">⚡ Fun Fact — I don't just learn tech — I build with it, break it, and rebuild it.</span>
      </div>
      <!-- Line 6: Pronouns -->
      <div>
        <span class="term-text line6 content-text">💬 Pronouns — He / Him</span>
      </div>
    </div>
  </foreignObject>
  <!-- Floating Petals & Coding Particles Overlay (Aesthetic Theme) -->
  <g id="readme-theme-overlay" opacity="0.8">
    <!-- Cherry Blossom Petal 1 (Drifts diagonally, rotates) -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.2">
      <animateTransform attributeName="transform" type="translate" values="-20,40; 870,200" dur="18s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 2 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.18">
      <animateTransform attributeName="transform" type="translate" values="120,-20; 880,110" dur="22s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="15s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 3 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FF8DA1" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="-50,140; 830,280" dur="20s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="18s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 4 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.22">
      <animateTransform attributeName="transform" type="translate" values="280,-30; 780,260" dur="25s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="10; 730" dur="24s" repeatCount="indefinite" additive="sum" />
    </path>

    <!-- Coding Particles (HTML, JS braces, sparks) -->
    <text x="0" y="0" fill="#00F2FE" font-family="monospace" font-size="11" font-weight="bold" opacity="0.14">
      &lt;/&gt;
      <animateTransform attributeName="transform" type="translate" values="40,250; 810,30" dur="26s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360" dur="16s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#8B5CF6" font-family="monospace" font-size="13" font-weight="bold" opacity="0.12">
      {{
      <animateTransform attributeName="transform" type="translate" values="180,290; 790,60" dur="28s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#3B82F6" font-family="monospace" font-size="12" font-weight="bold" opacity="0.15">
      ( )
      <animateTransform attributeName="transform" type="translate" values="10,100; 840,10" dur="23s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="30; 390" dur="14s" repeatCount="indefinite" additive="sum" />
    </text>
    
    <!-- Coding Sparkle Dots -->
    <circle cx="0" cy="0" r="1.5" fill="#00F2FE" opacity="0.25">
      <animateTransform attributeName="transform" type="translate" values="-30,60; 860,160" dur="19s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="1.2" fill="#8B5CF6" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="140,-10; 810,220" dur="24s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
