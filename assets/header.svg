<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2B0FF">
        <animate attributeName="stop-color" values="#E2B0FF;#90CAF9;#CE93D8;#E2B0FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#90CAF9">
        <animate attributeName="stop-color" values="#90CAF9;#CE93D8;#E2B0FF;#90CAF9" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#CE93D8">
        <animate attributeName="stop-color" values="#CE93D8;#E2B0FF;#90CAF9;#CE93D8" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="orbit-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#90CAF9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Soft ambient glow blobs -->
  <circle cx="200" cy="100" r="100" fill="#CE93D8" opacity="0.08" filter="url(#softglow)">
    <animate attributeName="cx" values="200;300;150;200" dur="18s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="160" r="110" fill="#90CAF9" opacity="0.08" filter="url(#softglow)">
    <animate attributeName="cx" values="600;500;650;600" dur="22s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbit ellipse track -->
  <ellipse cx="400" cy="130" rx="280" ry="85" fill="none" stroke="url(#orbit-line)" stroke-width="1" stroke-dasharray="6 8" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-56" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ====== ORBITING TECH BADGES (clean rounded-rect + text — bulletproof on GitHub) ====== -->

  <!-- 1 · JavaScript -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="0s">
      <mpath href="#orbit"/>
    </animateMotion>
  </g>
  <!-- Using manual positioning with animate instead of animateMotion for max compatibility -->

  <!-- Orbit path definition for reuse -->
  <defs>
    <path id="orbit" d="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130" fill="none"/>
  </defs>

  <!-- 1 · JS badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="0s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="0s"/>
      <rect x="-20" y="-11" width="40" height="22" rx="5" fill="#F7DF1E"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="800" fill="#1a1a1a">JS</text>
    </g>
  </g>

  <!-- 2 · Python badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="-3s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="-3s"/>
      <rect x="-25" y="-11" width="50" height="22" rx="5" fill="#3776AB"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">PY</text>
    </g>
  </g>

  <!-- 3 · Tailwind badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="-6s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="-6s"/>
      <rect x="-20" y="-11" width="40" height="22" rx="5" fill="#06B6D4"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">TW</text>
    </g>
  </g>

  <!-- 4 · Firebase badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="-9s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="-9s"/>
      <rect x="-20" y="-11" width="40" height="22" rx="5" fill="#FFCA28"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="800" fill="#1a1a1a">FB</text>
    </g>
  </g>

  <!-- 5 · FastAPI badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="-12s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="-12s"/>
      <rect x="-23" y="-11" width="46" height="22" rx="5" fill="#009688"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#fff">API</text>
    </g>
  </g>

  <!-- 6 · HTML5 badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="-15s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="-15s"/>
      <rect x="-24" y="-11" width="48" height="22" rx="5" fill="#E44D26"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">HTML</text>
    </g>
  </g>

  <!-- 7 · CSS3 badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="-18s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="-18s"/>
      <rect x="-22" y="-11" width="44" height="22" rx="5" fill="#264DE4"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">CSS</text>
    </g>
  </g>

  <!-- 8 · Git badge -->
  <g>
    <animateMotion dur="24s" repeatCount="indefinite" begin="-21s" path="M 120,130 A 280,85 0 1 1 680,130 A 280,85 0 1 1 120,130"/>
    <g>
      <animate attributeName="opacity" values="1;0.35;1;0.35;1" dur="24s" repeatCount="indefinite" begin="-21s"/>
      <rect x="-20" y="-11" width="40" height="22" rx="5" fill="#F05032"/>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#fff">GIT</text>
    </g>
  </g>

  <!-- ====== TITLE ====== -->
  <text x="400" y="125" text-anchor="middle" fill="url(#title-grad)" filter="url(#glow)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-weight="900" font-size="56" letter-spacing="-1">Jyotirmoy Laha</text>

  <!-- ====== SUBTITLE ====== -->
  <text x="400" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-weight="700" font-size="18" letter-spacing="7" fill="#B39DDB">
    WEB DEVELOPER
    <animate attributeName="fill" values="#B39DDB;#90CAF9;#CE93D8;#B39DDB" dur="6s" repeatCount="indefinite"/>
  </text>

</svg>
