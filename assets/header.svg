<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c1936" stroke-width="1"/>
    </pattern>
    
    <!-- Blur filter for background light blobs -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>

    <!-- Text glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.75" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animated linear gradient for title (Premium Purple & Teal) -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6">
        <animate attributeName="stop-color" values="#8B5CF6; #3B82F6; #00F2FE; #8B5CF6" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#3B82F6">
        <animate attributeName="stop-color" values="#3B82F6; #00F2FE; #8B5CF6; #3B82F6" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00F2FE">
        <animate attributeName="stop-color" values="#00F2FE; #8B5CF6; #3B82F6; #00F2FE" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Orbit line gradient -->
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <style>
    .font-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Outfit", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: 56px;
      letter-spacing: -1px;
    }
    .font-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 7px;
    }
  </style>

  <!-- Solid background -->
  <rect width="800" height="260" fill="#07050f" rx="16" />

  <!-- Animated mesh/grid background -->
  <rect width="800" height="260" fill="url(#grid)" opacity="0.5" rx="16" />

  <!-- Glowing background light blobs -->
  <circle cx="150" cy="80" r="85" fill="#8B5CF6" opacity="0.18" filter="url(#blur)">
    <animate attributeName="cx" values="150; 250; 100; 150" dur="16s" repeatCount="indefinite" />
    <animate attributeName="cy" values="80; 130; 50; 80" dur="16s" repeatCount="indefinite" />
  </circle>

  <circle cx="650" cy="180" r="95" fill="#00F2FE" opacity="0.15" filter="url(#blur)">
    <animate attributeName="cx" values="650; 550; 700; 650" dur="20s" repeatCount="indefinite" />
    <animate attributeName="cy" values="180; 120; 220; 180" dur="20s" repeatCount="indefinite" />
  </circle>

  <!-- Orbit Track Behind the text -->
  <path d="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" fill="none" stroke="url(#orbit-grad)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.5"/>

  <!-- Orbiting Icons -->
  
  <!-- 1. JavaScript -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="0s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="0s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="0s" />
        <g transform="translate(-16, -16)">
          <rect width="32" height="32" rx="6" fill="#F7DF1E"/>
          <path d="M22 24c-.7.5-1.5.8-2.3.8-1.2 0-2-.6-2-1.9h1.9c0 .7.3 1 .9 1 .5 0 .7-.3.7-.7v-6.9h2v7.1c0 1.2-.5 1.6-1.2 1.6zm7.2-.6c-.5.7-1.4 1.4-2.8 1.4-1.7 0-2.6-1.1-2.6-2.6h1.9c0 .8.5 1.3 1.2 1.3.6 0 1-.3 1-.8 0-.5-.4-.7-1.1-.9l-.8-.2c-1.3-.3-2.1-1-2.1-2.2 0-1.4 1.1-2.3 2.5-2.3 1.3 0 2.1.6 2.6 1.4l-1.4.9c-.3-.5-.7-.8-1.2-.8-.5 0-.8.3-.8.7 0 .4.3.6 1 .8l.8.2c1.4.4 2.2 1 2.2 2.3 0 1.5-1 2.3-2.8 2.3z" fill="#000000"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 2. Python -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-2.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-2.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="-2.5s" />
        <g transform="scale(0.667) translate(-24, -24)">
          <path d="M24 2c-6.6 0-6.1 2.9-6.1 2.9v3.2h6.2v.9h-8.7c-5.8 0-6.4 4.8-6.4 4.8s-.6 5.5 0 6.6c.5 1 2 1 2 1h1.7v-2.4c0-2.4 2-4.5 4.5-4.5h6.2c1.9 0 3.3-1.4 3.3-3.3V4.9c0-1.9-1.5-2.9-2.7-2.9zm-3.3 2.1a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4z" fill="#3776AB"/>
          <path d="M24 46c6.6 0 6.1-2.9 6.1-2.9v-3.2h-6.2v-.9h8.7s5.8 0 6.4-4.8c.6-1.1.6-5.5.6-6.6-.5-1-2-1-2-1h-1.7v2.4c0 2.4-2 4.5-4.5 4.5h-6.2c-1.9 0-3.3 1.4-3.3 3.3v6.3c0 1.9 1.5 2.9 2.7 2.9zm3.3-2.1a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4z" fill="#FFE052"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 3. Tailwind CSS -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="-5s" />
        <g transform="scale(0.667) translate(-24, -24)">
          <path d="M24 10.5c-4.8 0-7.7 2.4-8.7 7.2 2.9-2.9 5.8-3.4 8.7-1.5 1.7 1.2 2.9 2.5 4.3 4 2.2 2.4 4.8 5.3 10.1 5.3 4.8 0 7.7-2.4 8.7-7.2-2.9 2.9-5.8 3.4-8.7 1.5-1.7-1.2-2.9-2.5-4.3-4-2.2-2.4-4.8-5.3-10.1-5.3zm-11 11c-4.8 0-7.7 2.4-8.7 7.2 2.9-2.9 5.8-3.4 8.7-1.5 1.7 1.2 2.9 2.5 4.3 4 2.2 2.4 4.8 5.3 10.1 5.3 4.8 0 7.7-2.4 8.7-7.2-2.9 2.9-5.8 3.4-8.7 1.5-1.7-1.2-2.9-2.5-4.3-4-2.2-2.4-4.8-5.3-10.1-5.3z" fill="#38BDF8"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 4. Firebase -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-7.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-7.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="-7.5s" />
        <g transform="scale(0.667) translate(-24, -24)">
          <path d="M8.2 35.2L22.6 6c.4-.9 1.7-.9 2.1 0l4.1 7.8L8.2 35.2z" fill="#FFC229"/>
          <path d="M30.5 17.5l-6.8-13c-.4-.9-1.7-.9-2.1 0L7.3 37.1l23.2-19.6z" fill="#FFA000"/>
          <path d="M7.3 37.1l.4.5 32.1-4c.9-.1 1.3-1.1.6-1.7L30.5 17.5 7.3 37.1z" fill="#F44336"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 5. FastAPI -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-10s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-10s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="-10s" />
        <g transform="scale(0.667) translate(-24, -24)">
          <rect x="4" y="4" width="40" height="40" rx="8" fill="#009688"/>
          <path d="M25 8L13 26h10l-2 14 14-18h-10l2-12z" fill="#FFFFFF"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 6. HTML5 -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-12.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-12.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="-12.5s" />
        <g transform="scale(0.667) translate(-24, -24)">
          <path d="M5 3l4 35 15 4 15-4 4-35h-38z" fill="#E34F26"/>
          <path d="M24 6v33l12-3 3-30h-15z" fill="#F16529"/>
          <path d="M24 18h7l-.5 5.5h-6.5v4.5h6l-1 9-5 1.5v-20.5z" fill="#EBEBEB"/>
          <path d="M24 13h12.5l-.5 5h-12v-5z" fill="#FFFFFF"/>
          <path d="M24 18v5h-6.5l-.3-3h6.8z" fill="#FFFFFF"/>
          <path d="M24 13v5h-11.5l.7-8h10.8z" fill="#FFFFFF"/>
          <path d="M24 27.5l-5-1.5-.3-3h-5l.5 6.5 9.8 2.7v-4.7z" fill="#FFFFFF"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 7. CSS3 -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-15s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-15s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="-15s" />
        <g transform="scale(0.667) translate(-24, -24)">
          <path d="M5 3l4 35 15 4 15-4 4-35H5z" fill="#1572B6"/>
          <path d="M24 6v33l12-3.3 3.3-29.7H24z" fill="#33A9DC"/>
          <path d="M24 13h11.2l-.3 3.3h-10.9v4.5h10.4l-.8 9-9.6 2.6v-4.7l4.7-1.3.3-3.6H24v-4.5H18.7l-.3-3.3H24v-4.5h-5.8l-.3-3.3H24v4.5z" fill="#FFFFFF"/>
          <path d="M24 17.5H18.7l-.3-3.3H24v3.3z" fill="#EBEBEB" opacity="0.8"/>
          <path d="M24 26.5v4.7l-4.7-1.3-.3-3H14l.6 6.8 9.4 2.6v-9.8z" fill="#EBEBEB" opacity="0.8"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 8. Git -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-17.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-17.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9; 0.6; 0.9; 1.2; 0.9" dur="20s" repeatCount="indefinite" begin="-17.5s" />
        <g transform="scale(0.667) translate(-24, -24)">
          <rect x="6" y="6" width="36" height="36" rx="8" transform="rotate(45 24 24)" fill="#F05032"/>
          <path d="M24 15v15M24 22.5c-1.5 0-3 .5-5.5 2" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="24" cy="15" r="3.5" fill="#FFFFFF"/>
          <circle cx="18.5" cy="24.5" r="3.5" fill="#FFFFFF"/>
          <circle cx="24" cy="30" r="3.5" fill="#FFFFFF"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Main Title -->
  <text x="400" y="125" text-anchor="middle" fill="url(#title-grad)" filter="url(#glow)" class="font-title">
    Jyotirmoy Laha
  </text>

  <!-- Subtitle -->
  <text x="400" y="178" text-anchor="middle" fill="#a29bfe" class="font-subtitle">
    WEB DEVELOPER
    <animate attributeName="fill" values="#a29bfe; #ffffff; #a29bfe" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7; 1; 0.7" dur="4s" repeatCount="indefinite" />
  </text>

</svg>
