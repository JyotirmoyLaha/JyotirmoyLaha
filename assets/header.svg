<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%">
  <defs>
    <!-- Blur filter for background light blobs -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>

    <!-- Premium text glow filter (LED Aura effect) -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animated linear gradient for title (Vibrant Neon Sunset / Cyberpunk Aura) -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF007F">
        <animate attributeName="stop-color" values="#FF007F; #7F00FF; #00F2FE; #FF007F" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#7F00FF">
        <animate attributeName="stop-color" values="#7F00FF; #00F2FE; #FF007F; #7F00FF" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00F2FE">
        <animate attributeName="stop-color" values="#00F2FE; #FF007F; #7F00FF; #00F2FE" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Orbit line gradient -->
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007F" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#7F00FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <style>
    .font-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Outfit", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: 56px;
      letter-spacing: -1px;
    }
    .font-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 7px;
    }
  </style>

  <!-- Glowing background light blobs -->
  <circle cx="150" cy="80" r="85" fill="#FF007F" opacity="0.12" filter="url(#blur)">
    <animate attributeName="cx" values="150; 250; 100; 150" dur="16s" repeatCount="indefinite" />
    <animate attributeName="cy" values="80; 130; 50; 80" dur="16s" repeatCount="indefinite" />
  </circle>

  <circle cx="650" cy="180" r="95" fill="#00F2FE" opacity="0.12" filter="url(#blur)">
    <animate attributeName="cx" values="650; 550; 700; 650" dur="20s" repeatCount="indefinite" />
    <animate attributeName="cy" values="180; 120; 220; 180" dur="20s" repeatCount="indefinite" />
  </circle>

  <!-- Orbit Track Behind the text -->
  <path d="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" fill="none" stroke="url(#orbit-grad)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6"/>

  <!-- Orbiting Icons -->
  
  <!-- 1. JavaScript -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="0s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="0s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="0s" />
        <g transform="translate(-16, -16)">
          <rect width="32" height="32" rx="6" fill="#F7DF1E"/>
          <text x="28" y="27" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="13" fill="#000" text-anchor="end">JS</text>
        </g>
      </g>
    </g>
  </g>

  <!-- 2. Python -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-2.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-2.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="-2.5s" />
        <g transform="translate(-16, -16)">
          <path d="M16 2 c-4.4 0-4 1.9-4 1.9 v2.2 h8 v0.6 h-11.1 c-3.9 0-4.3 3.2-4.3 3.2 s-.4 3.7 0 4.4 c.3 0.7 1.3 0.7 1.3 0.7 h1.1 v-1.6 c0-1.6 1.3-3 3-3 h4.1 c1.3 0 2.2-.9 2.2-2.2 V 4.9 c0-1.3-1-2.9-1.8-2.9 z" fill="#3776AB"/>
          <path d="M16 30 c4.4 0 4-1.9 4-1.9 v-2.2 h-8 v-0.6 h11.1 c3.9 0 4.3-3.2 4.3-3.2 s.4-3.7 0-4.4 c-.3-0.7-1.3-0.7-1.3-0.7 h-1.1 v 1.6 c0 1.6-1.3 3-3 3 h-4.1 c-1.3 0-2.2.9-2.2 2.2 v 2.3 c0 1.3 1 2.9 1.8 2.9 z" fill="#FFE052"/>
          <circle cx="13.5" cy="4.5" r="0.8" fill="#FFF"/>
          <circle cx="18.5" cy="27.5" r="0.8" fill="#FFF"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 3. Tailwind CSS -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="-5s" />
        <g transform="translate(-16, -16)">
          <path d="M16 8C12.8 8 10.9 9.6 10.2 12.8C12.2 10.9 14.1 10.4 16 11.2C17.1 11.7 17.9 12.5 18.8 13.5C20.3 15.1 22 17 25.6 17C28.8 17 30.7 15.4 31.4 12.2C29.4 14.1 27.5 14.6 25.6 13.8C24.5 13.3 23.7 12.5 22.8 11.5C21.3 9.9 19.6 8 16 8Z M8.5 15.5C5.3 15.5 3.4 17.1 2.7 20.3C4.7 18.4 6.6 17.9 8.5 18.7C9.6 19.2 10.4 20 11.3 21C12.8 22.6 14.5 24.5 18.1 24.5C21.3 24.5 23.2 22.9 23.9 19.7C21.9 21.6 20 22.1 18.1 21.3C17 20.8 16.2 20 15.3 19C13.8 17.4 12.1 15.5 8.5 15.5Z" fill="#38BDF8"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 4. Firebase -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-7.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-7.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="-7.5s" />
        <g transform="translate(-16, -16)">
          <path d="M5.5 23.5 L15 4c.3-.6 1.1-.6 1.4 0 l2.7 5.2 Z" fill="#FFC229"/>
          <path d="M20.3 11.7 l-4.5-8.7c-.3-.6-1.1-.6-1.4 0 L4.8 24.8 Z" fill="#FFA000"/>
          <path d="M4.8 24.8 l.3.3 21.4-2.7c.6-.1.9-.8.4-1.2 L20.3 11.7 Z" fill="#F44336"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 5. FastAPI -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-10s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-10s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="-10s" />
        <g transform="translate(-16, -16)">
          <rect x="2" y="2" width="28" height="28" rx="6" fill="#009688"/>
          <path d="M17 6 L9 18 h7 l-1.5 8 9.5-12 h-7 Z" fill="#FFFFFF"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 6. HTML5 -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-12.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-12.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="-12.5s" />
        <g transform="translate(-16, -16)">
          <path d="M2 2 L30 2 L27.2 28 L16 31 L4.8 28 Z" fill="#E34F26"/>
          <path d="M16 2 L30 2 L27.2 28 L16 31 Z" fill="#F16529"/>
          <path d="M16 8.5 h-7.5 l.3 3.5 h7.2 l-.3 3.5 -4.7 1.3 -4.7-1.3-.3-3 h-3.5 l.5 6.5 8 2.2 8-2.2 .8-9 h-11.7 l-.3-3.5 H16 Z" fill="#FFFFFF"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 7. CSS3 -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-15s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-15s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="-15s" />
        <g transform="translate(-16, -16)">
          <path d="M2 2 L30 2 L27.2 28 L16 31 L4.8 28 Z" fill="#1572B6"/>
          <path d="M16 2 L30 2 L27.2 28 L16 31 Z" fill="#33A9DC"/>
          <path d="M16 8.5 H9 l.3 3.5 h6.4 v3 H9.7 l.3 3.5 H16 c2.5 0 4-1 4-3.5 s-1.5-3-4-3 h-1.5 v-3.5 h1.5 c2 0 3.5-1 3.5-3 s-1.5-3-3.5-3 z" fill="#FFFFFF"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 8. Git -->
  <g>
    <animateMotion dur="20s" repeatCount="indefinite" path="M 120,130 A 280,80 0 0,0 680,130 A 280,80 0 0,0 120,130" rotate="none" begin="-17.5s" />
    <g>
      <animate attributeName="opacity" values="0.65; 0.3; 0.65; 1.0; 0.65" dur="20s" repeatCount="indefinite" begin="-17.5s" />
      <g>
        <animateTransform attributeName="transform" type="scale" values="0.9,0.9; 0.6,0.6; 0.9,0.9; 1.2,1.2; 0.9,0.9" dur="20s" repeatCount="indefinite" begin="-17.5s" />
        <g transform="translate(-16, -16)">
          <g transform="rotate(45 16 16)">
            <rect x="5" y="5" width="22" height="22" rx="4" fill="#F05032"/>
            <path d="M16 9 v14 M16 16 c-1.5 0-3 .5-5 2" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <circle cx="16" cy="9" r="2.5" fill="#FFFFFF"/>
            <circle cx="11" cy="18" r="2.5" fill="#FFFFFF"/>
            <circle cx="16" cy="23" r="2.5" fill="#FFFFFF"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Main Title -->
  <text x="400" y="125" text-anchor="middle" fill="url(#title-grad)" filter="url(#glow)" class="font-title">
    Jyotirmoy Laha
  </text>

  <!-- Subtitle -->
  <text x="400" y="178" text-anchor="middle" fill="#FF007F" filter="url(#glow)" class="font-subtitle">
    WEB DEVELOPER
    <animate attributeName="fill" values="#FF007F; #7F00FF; #00F2FE; #FF007F" dur="8s" repeatCount="indefinite" />
  </text>

</svg>
