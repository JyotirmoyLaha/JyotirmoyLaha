<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c1936" stroke-width="1"/>
    </pattern>
    
    <!-- Blur filter for background light blobs -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>

    <!-- Text glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.7" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animated linear gradient for title -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3366">
        <animate attributeName="stop-color" values="#FF3366; #9D4EDE; #33CCFF; #FF3366" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#9D4EDE">
        <animate attributeName="stop-color" values="#9D4EDE; #33CCFF; #FF3366; #9D4EDE" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#33CCFF">
        <animate attributeName="stop-color" values="#33CCFF; #FF3366; #9D4EDE; #33CCFF" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <style>
    .font-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Outfit", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: 56px;
      letter-spacing: -1px;
    }
    .font-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 7px;
    }
  </style>

  <!-- Solid background -->
  <rect width="100%" height="100%" fill="#0a0814" />

  <!-- Animated mesh/grid background -->
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.8" />

  <!-- Glowing background light blobs -->
  <!-- Blob 1: Pink/Red -->
  <circle cx="150" cy="80" r="80" fill="#FF3366" opacity="0.18" filter="url(#blur)">
    <animate attributeName="cx" values="150; 250; 100; 150" dur="16s" repeatCount="indefinite" />
    <animate attributeName="cy" values="80; 130; 50; 80" dur="16s" repeatCount="indefinite" />
  </circle>

  <!-- Blob 2: Cyan/Blue -->
  <circle cx="650" cy="180" r="90" fill="#33CCFF" opacity="0.18" filter="url(#blur)">
    <animate attributeName="cx" values="650; 550; 700; 650" dur="20s" repeatCount="indefinite" />
    <animate attributeName="cy" values="180; 120; 220; 180" dur="20s" repeatCount="indefinite" />
  </circle>

  <!-- Blob 3: Violet -->
  <circle cx="400" cy="130" r="75" fill="#9D4EDE" opacity="0.15" filter="url(#blur)">
    <animate attributeName="cx" values="400; 450; 350; 400" dur="18s" repeatCount="indefinite" />
    <animate attributeName="cy" values="130; 90; 170; 130" dur="18s" repeatCount="indefinite" />
  </circle>

  <!-- Main Title -->
  <text x="400" y="115" text-anchor="middle" fill="url(#title-grad)" filter="url(#glow)" class="font-title">
    Jyotirmoy Laha
  </text>

  <!-- Subtitle -->
  <text x="400" y="172" text-anchor="middle" fill="#a29bfe" class="font-subtitle">
    WEB DEVELOPER
    <animate attributeName="fill" values="#a29bfe; #ffffff; #a29bfe" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7; 1; 0.7" dur="4s" repeatCount="indefinite" />
  </text>

  <!-- Glowing line at the bottom -->
  <line x1="0" y1="258" x2="800" y2="258" stroke="url(#title-grad)" stroke-width="4" stroke-dasharray="150 250" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0; 800" dur="10s" repeatCount="indefinite" />
  </line>
</svg>
