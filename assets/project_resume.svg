<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="300">
  <defs>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Theme Gradients -->
    <linearGradient id="theme-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDE" />
      <stop offset="100%" stop-color="#33CCFF" />
    </linearGradient>

    <!-- Clipboard gradient -->
    <linearGradient id="clip-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1a3a" />
      <stop offset="100%" stop-color="#2d2757" />
    </linearGradient>
  </defs>

  <style>
    .card-border {
      fill: #0c0b16;
      stroke: #221e3f;
      stroke-width: 1.5;
      rx: 16;
      transition: all 0.3s ease;
    }
    .card-border:hover {
      stroke: #9D4EDE;
    }
    .floating-box {
      animation: float 4.5s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .tech-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #c9d1d9;
      background-color: #141226;
      border: 1px solid #221e3f;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: bold;
      color: #b7a6ff;
      background-color: rgba(157, 78, 221, 0.1);
      border: 1px solid rgba(157, 78, 221, 0.2);
      margin-right: 6px;
    }
  </style>

  <!-- Card Background -->
  <rect width="848" height="298" x="1" y="1" class="card-border" />

  <!-- Vertical Divider -->
  <line x1="520" y1="20" x2="520" y2="280" stroke="#221e3f" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Left Column: Details (foreignObject) -->
  <foreignObject x="25" y="25" width="470" height="250">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #c9d1d9;
      user-select: none;
    ">
      <h3 style="color: #ffffff; font-size: 20px; margin: 0 0 10px 0; font-weight: 800; display: flex; align-items: center; gap: 8px;">
        🧠 AI Resume Analyzer
      </h3>
      
      <div style="margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 4px;">
        <span class="badge">Generative AI</span>
        <span class="badge">FastAPI Backend</span>
        <span class="badge">React &amp; Vite</span>
        <span class="badge">LLM Prompting</span>
      </div>

      <ul style="margin: 0; padding-left: 20px; font-size: 13px; line-height: 22px; color: #8b949e; list-style-type: square;">
        <li style="margin-bottom: 8px;">Upload resumes and analyze them with advanced LLM APIs to receive dynamic feedback on keyword matching and formatting.</li>
        <li style="margin-bottom: 8px;">Generates detailed match scores, missing keyword suggestions, and personalized recommendations.</li>
        <li>Interactive AI Chatbot to converse with your analyzed resume and ask specific career-related questions.</li>
      </ul>
    </div>
  </foreignObject>

  <!-- Right Column: Animated 3D Graphic (scaled and translated) -->
  <g transform="translate(585, -20) scale(2.2)">
    <!-- 3D Isometric Floating Clipboard Setup -->
    <g class="floating-box" style="transform-origin: 40px 50px;">
      <!-- Under-shadow -->
      <ellipse cx="40" cy="85" rx="22" ry="4" fill="rgba(0, 0, 0, 0.35)" />

      <!-- Clipboard Base (3D Box) -->
      <!-- Left side extrusion -->
      <polygon points="18,48 18,51 40,62 40,59" fill="#151229" />
      <!-- Right side extrusion -->
      <polygon points="40,59 40,62 62,51 62,48" fill="#0d0a1b" />
      <!-- Top Face -->
      <polygon points="40,37 62,48 40,59 18,48" fill="url(#clip-grad)" stroke="#9D4EDE" stroke-width="0.8" />
      
      <!-- Metal Clip on top of clipboard -->
      <polygon points="36,36 44,40 40,42 32,38" fill="#8b949e" />
      <polygon points="40,42 44,40 42,39 38,41" fill="#c9d1d9" />

      <!-- Paper Document floating on top (3D plane) -->
      <polygon points="40,39 58,48 40,57 22,48" fill="url(#theme-grad)" opacity="0.85" />
      
      <!-- Text Lines on 3D Document -->
      <line x1="28" y1="46" x2="42" y2="53" stroke="#ffffff" stroke-width="1.2" opacity="0.7" />
      <line x1="32" y1="50" x2="48" y2="58" stroke="#ffffff" stroke-width="1.2" opacity="0.7" />
      <line x1="30" y1="42" x2="38" y2="46" stroke="#ffffff" stroke-width="1.2" opacity="0.7" />

      <!-- Animated Tilted Scanning Light Beam -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,-8; 0,14; 0,-8" dur="3.5s" repeatCount="indefinite" />
        <!-- Glowing scan beam projection -->
        <polygon points="18,48 62,48 40,62" fill="rgba(51, 204, 255, 0.15)" filter="url(#glow)" />
        <!-- Scan line -->
        <line x1="18" y1="48" x2="62" y2="48" stroke="#33CCFF" stroke-width="1.8" filter="url(#glow)" />
      </g>
    </g>
  </g>

  <!-- Right Column Bottom: Tech Stack Pills -->
  <foreignObject x="545" y="210" width="280" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    ">
      <span class="tech-pill">React</span>
      <span class="tech-pill">Vite</span>
      <span class="tech-pill">FastAPI</span>
      <span class="tech-pill">Python</span>
      <span class="tech-pill">Tailwind CSS</span>
      <span class="tech-pill">Gemini API</span>
      <span class="tech-pill">Llama3</span>
    </div>
  </foreignObject>
  <!-- Floating Petals & Coding Particles Overlay (Aesthetic Theme) -->
  <g id="readme-theme-overlay" opacity="0.8">
    <!-- Cherry Blossom Petal 1 (Drifts diagonally, rotates) -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.2">
      <animateTransform attributeName="transform" type="translate" values="-20,40; 870,200" dur="18s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 2 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.18">
      <animateTransform attributeName="transform" type="translate" values="120,-20; 880,110" dur="22s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="15s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 3 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FF8DA1" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="-50,140; 830,280" dur="20s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="18s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 4 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.22">
      <animateTransform attributeName="transform" type="translate" values="280,-30; 780,260" dur="25s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="10; 730" dur="24s" repeatCount="indefinite" additive="sum" />
    </path>

    <!-- Coding Particles (HTML, JS braces, sparks) -->
    <text x="0" y="0" fill="#00F2FE" font-family="monospace" font-size="11" font-weight="bold" opacity="0.14">
      &lt;/&gt;
      <animateTransform attributeName="transform" type="translate" values="40,250; 810,30" dur="26s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360" dur="16s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#8B5CF6" font-family="monospace" font-size="13" font-weight="bold" opacity="0.12">
      {{
      <animateTransform attributeName="transform" type="translate" values="180,290; 790,60" dur="28s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#3B82F6" font-family="monospace" font-size="12" font-weight="bold" opacity="0.15">
      ( )
      <animateTransform attributeName="transform" type="translate" values="10,100; 840,10" dur="23s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="30; 390" dur="14s" repeatCount="indefinite" additive="sum" />
    </text>
    
    <!-- Coding Sparkle Dots -->
    <circle cx="0" cy="0" r="1.5" fill="#00F2FE" opacity="0.25">
      <animateTransform attributeName="transform" type="translate" values="-30,60; 860,160" dur="19s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="1.2" fill="#8B5CF6" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="140,-10; 810,220" dur="24s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
