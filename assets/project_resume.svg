<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="300">
  <defs>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Theme Gradients -->
    <linearGradient id="theme-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDE" />
      <stop offset="100%" stop-color="#33CCFF" />
    </linearGradient>

    <!-- Clipboard gradient -->
    <linearGradient id="clip-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1a3a" />
      <stop offset="100%" stop-color="#2d2757" />
    </linearGradient>

    <!-- Glowing border gradient -->
    <linearGradient id="neon-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>

    <!-- Paper gradient -->
    <linearGradient id="paper-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>

    <!-- Holographic Beam Gradient -->
    <linearGradient id="cyan-beam-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(34, 211, 238, 0)" />
      <stop offset="100%" stop-color="rgba(34, 211, 238, 0.35)" />
    </linearGradient>
  </defs>

  <style>
    .card-border {
      fill: #0c0b16;
      stroke: #221e3f;
      stroke-width: 1.5;
      rx: 16;
      transition: all 0.3s ease;
    }
    .card-border:hover {
      stroke: #9D4EDE;
    }
    .floating-box {
      animation: float 4.5s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .tech-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #c9d1d9;
      background-color: #141226;
      border: 1px solid #221e3f;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: bold;
      color: #b7a6ff;
      background-color: rgba(157, 78, 221, 0.1);
      border: 1px solid rgba(157, 78, 221, 0.2);
      margin-right: 6px;
    }
  </style>

  <!-- Card Background -->
  <rect width="848" height="298" x="1" y="1" class="card-border" />

  <!-- Vertical Divider -->
  <line x1="520" y1="20" x2="520" y2="280" stroke="#221e3f" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Left Column: Details (foreignObject) -->
  <foreignObject x="25" y="25" width="470" height="250">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #c9d1d9;
      user-select: none;
    ">
      <h3 style="color: #ffffff; font-size: 20px; margin: 0 0 10px 0; font-weight: 800; display: flex; align-items: center; gap: 8px;">
        🧠 AI Resume Analyzer
      </h3>
      
      <div style="margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 4px;">
        <span class="badge">NLP Analyzer</span>
        <span class="badge">FastAPI Backend</span>
        <span class="badge">HTML/CSS/JS</span>
        <span class="badge">Skill Gap Finder</span>
      </div>

      <ul style="margin: 0; padding-left: 20px; font-size: 13px; line-height: 22px; color: #8b949e; list-style-type: square;">
        <li style="margin-bottom: 8px;">Upload PDF resumes and select target career roles to analyze and parse skill requirements.</li>
        <li style="margin-bottom: 8px;">Generates real-time match scores, lists matched competencies, and identifies critical missing skills.</li>
        <li>Provides expert career feedback, personalized recommendations, and direct links to learning paths.</li>
      </ul>
    </div>
  </foreignObject>

  <!-- Right Column: Animated 3D Graphic (scaled and translated) -->
  <g transform="translate(585, -20) scale(2.2)">
    <!-- 3D Isometric Floating Scanner Setup -->
    <g class="floating-box" style="transform-origin: 40px 50px;">
      <!-- Under-shadow -->
      <ellipse cx="40" cy="85" rx="28" ry="4" fill="rgba(0, 0, 0, 0.4)" />

      <!-- Scanner Base plate -->
      <!-- Left side extrusion -->
      <polygon points="15,68 15,72 40,84 40,80" fill="#110e24" />
      <!-- Right side extrusion -->
      <polygon points="40,80 40,84 65,72 65,68" fill="#0b0818" />
      <!-- Top face with Glowing Border -->
      <polygon points="15,68 40,56 65,68 40,80" fill="#1b1738" stroke="url(#neon-glow-grad)" stroke-width="1" />
      
      <!-- Slot for paper feed -->
      <polygon points="24,69.5 56,58.8 54,60.8 26,71.5" fill="#05030d" />

      <!-- Glass support back plate stand (behind paper) -->
      <polygon points="23,30 57,19 57,62 23,73" fill="rgba(24, 21, 51, 0.6)" stroke="#3e3570" stroke-width="0.8" />

      <!-- Upright Paper Document (3D plane) -->
      <polygon points="25,35 55,25 55,60 25,70" fill="url(#paper-grad)" stroke="#ffffff" stroke-width="0.5" />
      
      <!-- Resume Details on Vertical Paper -->
      <!-- Profile Avatar placeholder (vertical ellipse) -->
      <ellipse cx="32" cy="42" rx="2" ry="3" fill="#3b82f6" opacity="0.8" />
      <!-- Name Header Lines (slanted parallel to top edge) -->
      <line x1="36" y1="40" x2="48" y2="36" stroke="#1e293b" stroke-width="1.4" stroke-linecap="round" />
      <line x1="36" y1="43" x2="44" y2="40.3" stroke="#64748b" stroke-width="0.8" stroke-linecap="round" />
      
      <!-- Text Lines representing resume fields -->
      <line x1="28" y1="48" x2="52" y2="40" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round" />
      <line x1="28" y1="52" x2="42" y2="47.3" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round" />
      <line x1="28" y1="56" x2="52" y2="48" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round" />
      <line x1="28" y1="60" x2="46" y2="54" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round" />
      
      <!-- Green parsed skill points -->
      <circle cx="46" cy="45" r="0.8" fill="#10b981" filter="url(#glow)" />
      <circle cx="50" cy="52" r="0.8" fill="#10b981" filter="url(#glow)" />

      <!-- Floating Code/Data Particles rising vertically -->
      <circle cx="30" cy="60" r="0.6" fill="#22d3ee" opacity="0">
        <animate attributeName="cy" values="60; 20" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.8; 0" dur="2.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="42" cy="50" r="0.6" fill="#a855f7" opacity="0">
        <animate attributeName="cy" values="50; 15" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.7; 0" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="48" cy="45" r="0.5" fill="#22d3ee" opacity="0">
        <animate attributeName="cy" values="45; 10" dur="2.2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0; 0.9; 0" dur="2.2s" repeatCount="indefinite" />
      </circle>

      <!-- Animated Holographic Scanning Laser Beam -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,-10; 0,25; 0,-10" dur="4.5s" repeatCount="indefinite" />
        <!-- Emitter Bar -->
        <line x1="30" y1="10" x2="50" y2="3.3" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
        <!-- Volumetric Holographic Fan Light -->
        <polygon points="30,10 50,3.3 55,35 25,45" fill="url(#cyan-beam-grad)" opacity="0.4" />
        <!-- Glowing Laser Scan Line -->
        <line x1="25" y1="45" x2="55" y2="35" stroke="#22d3ee" stroke-width="1.8" filter="url(#glow)" />
      </g>
    </g>
  </g>

  <!-- Right Column Bottom: Tech Stack Pills -->
  <foreignObject x="545" y="210" width="280" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    ">
      <span class="tech-pill">HTML5</span>
      <span class="tech-pill">CSS3</span>
      <span class="tech-pill">JS</span>
      <span class="tech-pill">FastAPI</span>
      <span class="tech-pill">Python</span>
      <span class="tech-pill">pdfplumber</span>
      <span class="tech-pill">NLTK</span>
    </div>
  </foreignObject>
  <!-- Floating Petals & Coding Particles Overlay (Aesthetic Theme) -->
  <g id="readme-theme-overlay" opacity="0.8">
    <!-- Cherry Blossom Petal 1 (Drifts diagonally, rotates) -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.2">
      <animateTransform attributeName="transform" type="translate" values="-20,40; 870,200" dur="18s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 2 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.18">
      <animateTransform attributeName="transform" type="translate" values="120,-20; 880,110" dur="22s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="15s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 3 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FF8DA1" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="-50,140; 830,280" dur="20s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="18s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 4 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.22">
      <animateTransform attributeName="transform" type="translate" values="280,-30; 780,260" dur="25s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="10; 730" dur="24s" repeatCount="indefinite" additive="sum" />
    </path>

    <!-- Coding Particles (HTML, JS braces, sparks) -->
    <text x="0" y="0" fill="#00F2FE" font-family="monospace" font-size="11" font-weight="bold" opacity="0.14">
      &lt;/&gt;
      <animateTransform attributeName="transform" type="translate" values="40,250; 810,30" dur="26s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360" dur="16s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#8B5CF6" font-family="monospace" font-size="13" font-weight="bold" opacity="0.12">
      {{
      <animateTransform attributeName="transform" type="translate" values="180,290; 790,60" dur="28s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#3B82F6" font-family="monospace" font-size="12" font-weight="bold" opacity="0.15">
      ( )
      <animateTransform attributeName="transform" type="translate" values="10,100; 840,10" dur="23s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="30; 390" dur="14s" repeatCount="indefinite" additive="sum" />
    </text>
    
    <!-- Coding Sparkle Dots -->
    <circle cx="0" cy="0" r="1.5" fill="#00F2FE" opacity="0.25">
      <animateTransform attributeName="transform" type="translate" values="-30,60; 860,160" dur="19s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="1.2" fill="#8B5CF6" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="140,-10; 810,220" dur="24s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
