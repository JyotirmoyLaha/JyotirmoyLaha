<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 16" width="100%" height="100%">
  <defs>
    <!-- Blur filter for neon glow -->
    <filter id="glow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animated linear gradient -->
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3366">
        <animate attributeName="stop-color" values="#FF3366; #9D4EDE; #33CCFF; #FF3366" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#9D4EDE">
        <animate attributeName="stop-color" values="#9D4EDE; #33CCFF; #FF3366; #9D4EDE" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#33CCFF">
        <animate attributeName="stop-color" values="#33CCFF; #FF3366; #9D4EDE; #33CCFF" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Glowing divider line -->
  <path d="M 20,8 L 780,8" stroke="url(#divider-grad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" opacity="0.85" />
  
  <!-- Rotating center diamond decoration -->
  <polygon points="400,3 405,8 400,13 395,8" fill="url(#divider-grad)" filter="url(#glow)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 400 8" 
      to="360 400 8" 
      dur="12s" 
      repeatCount="indefinite" />
  </polygon>
</svg>
