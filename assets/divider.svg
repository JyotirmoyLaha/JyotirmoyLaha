<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="100%">
  <defs>
    <!-- Blur filter for neon glow -->
    <filter id="glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Color shifting linear gradient with fading edges -->
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0">
        <animate attributeName="stop-color" values="#8B5CF6; #3B82F6; #00F2FE; #8B5CF6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="15%" stop-color="#8B5CF6" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#8B5CF6; #3B82F6; #00F2FE; #8B5CF6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="1">
        <animate attributeName="stop-color" values="#3B82F6; #00F2FE; #8B5CF6; #3B82F6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="85%" stop-color="#00F2FE" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#00F2FE; #8B5CF6; #3B82F6; #00F2FE" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0">
        <animate attributeName="stop-color" values="#00F2FE; #8B5CF6; #3B82F6; #00F2FE" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Glowing thin line -->
  <line x1="30" y1="10" x2="770" y2="10" stroke="url(#divider-grad)" stroke-width="1.8" filter="url(#glow)" stroke-linecap="round" />
  
  <!-- Central elongated capsule (pill shape) that dynamically stretches -->
  <rect x="370" y="7.5" width="60" height="5" rx="2.5" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="width" values="60; 80; 60" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x" values="370; 360; 370" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7; 1; 0.7" dur="4s" repeatCount="indefinite" />
  </rect>
</svg>
