<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="100%">
  <defs>
    <!-- Blur filter for neon glow -->
    <filter id="glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Color shifting linear gradient with fading edges -->
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0">
        <animate attributeName="stop-color" values="#8B5CF6; #3B82F6; #00F2FE; #8B5CF6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="15%" stop-color="#8B5CF6" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#8B5CF6; #3B82F6; #00F2FE; #8B5CF6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="1">
        <animate attributeName="stop-color" values="#3B82F6; #00F2FE; #8B5CF6; #3B82F6" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="85%" stop-color="#00F2FE" stop-opacity="0.85">
        <animate attributeName="stop-color" values="#00F2FE; #8B5CF6; #3B82F6; #00F2FE" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0">
        <animate attributeName="stop-color" values="#00F2FE; #8B5CF6; #3B82F6; #00F2FE" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Glowing thin line -->
  <line x1="30" y1="10" x2="770" y2="10" stroke="url(#divider-grad)" stroke-width="1.8" filter="url(#glow)" stroke-linecap="round" />
  
  <!-- Central elongated capsule (pill shape) that dynamically stretches -->
  <rect x="370" y="7.5" width="60" height="5" rx="2.5" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="width" values="60; 80; 60" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x" values="370; 360; 370" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.7; 1; 0.7" dur="4s" repeatCount="indefinite" />
  </rect>
  <!-- Floating Petals & Sparks Overlay (Narrow) -->
  <g id="readme-theme-overlay-narrow" opacity="0.8">
    <!-- Sliding Petal 1 -->
    <path d="M 0,0 C -2,-3 -4,-2 -4,1 C -3,4 0,5 0,5 C 0,5 3,4 4,1 C 4,-2 2,-3 0,0 Z" fill="#FFB7C5" opacity="0.25">
      <animateTransform attributeName="transform" type="translate" values="-30,6; 830,6" dur="14s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="8s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Sliding Petal 2 -->
    <path d="M 0,0 C -2,-3 -4,-2 -4,1 C -3,4 0,5 0,5 C 0,5 3,4 4,1 C 4,-2 2,-3 0,0 Z" fill="#FF8DA1" opacity="0.2">
      <animateTransform attributeName="transform" type="translate" values="-150,14; 850,14" dur="18s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="10s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Sliding Spark 1 -->
    <circle cx="0" cy="0" r="1.2" fill="#00F2FE" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="-80,10; 820,10" dur="12s" repeatCount="indefinite" />
    </circle>
    <!-- Sliding Spark 2 -->
    <circle cx="0" cy="0" r="1" fill="#8B5CF6" opacity="0.35">
      <animateTransform attributeName="transform" type="translate" values="-200,8; 840,8" dur="16s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
