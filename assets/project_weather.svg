<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="300">
  <defs>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Theme Gradients -->
    <linearGradient id="theme-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>

    <!-- 3D Sun Radial Shading Gradient -->
    <radialGradient id="sun-sphere-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="60%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </radialGradient>
  </defs>

  <style>
    .card-border {
      fill: #0c0b16;
      stroke: #221e3f;
      stroke-width: 1.5;
      rx: 16;
      transition: all 0.3s ease;
    }
    .card-border:hover {
      stroke: #38BDF8;
    }
    .cloud-group {
      animation: drift 5s infinite ease-in-out;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0px, 0px); }
      50% { transform: translate(3px, -2px); }
    }
    .tech-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      color: #c9d1d9;
      background-color: #141226;
      border: 1px solid #221e3f;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: bold;
      color: #38bdf8;
      background-color: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.2);
      margin-right: 6px;
    }
  </style>

  <!-- Card Background -->
  <rect width="848" height="298" x="1" y="1" class="card-border" />

  <!-- Vertical Divider -->
  <line x1="520" y1="20" x2="520" y2="280" stroke="#221e3f" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Left Column: Details (foreignObject) -->
  <foreignObject x="25" y="25" width="470" height="250">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #c9d1d9;
      user-select: none;
    ">
      <h3 style="color: #ffffff; font-size: 20px; margin: 0 0 10px 0; font-weight: 800; display: flex; align-items: center; gap: 8px;">
        ☀️ J.SkyCast Weather
      </h3>
      
      <div style="margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 4px;">
        <span class="badge">React App</span>
        <span class="badge">OpenWeather API</span>
        <span class="badge">Glassmorphic UI</span>
        <span class="badge">Vite Tooling</span>
      </div>

      <ul style="margin: 0; padding-left: 20px; font-size: 13px; line-height: 22px; color: #8b949e; list-style-type: square;">
        <li style="margin-bottom: 8px;">Real-time weather tracking application providing instant forecasts, atmospheric details, and daily/weekly trends.</li>
        <li style="margin-bottom: 8px;">Interactive search history and localized weather search utilizing direct OpenWeather API calls.</li>
        <li>Responsive glassmorphic layout that adapts dynamically to current weather conditions with clean SVG animations.</li>
      </ul>
    </div>
  </foreignObject>

  <!-- Right Column: Animated 3D Graphic (scaled and translated) -->
  <g transform="translate(585, -20) scale(2.2)">
    <!-- 3D Sun (Behind Cloud) -->
    <!-- Sun Shadow -->
    <ellipse cx="50" cy="46" rx="11" ry="5.5" fill="rgba(0, 0, 0, 0.25)" />

    <!-- 3D Sun Sphere -->
    <g transform="translate(50, 32)">
      <!-- Under-glow -->
      <circle cx="0" cy="0" r="14" fill="#FBBF24" opacity="0.3" filter="url(#glow)" />
      <!-- 3D Shaded Sphere -->
      <circle cx="0" cy="0" r="11" fill="url(#sun-sphere-grad)" />
      
      <!-- Rotating Rays (SMIL-based rotation centers perfectly around 0,0 local coordinates) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite" />
        <line x1="0" y1="-14" x2="0" y2="-18" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
        <line x1="0" y1="14" x2="0" y2="18" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
        <line x1="-14" y1="0" x2="-18" y2="0" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
        <line x1="14" y1="0" x2="18" y2="0" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
        <line x1="-10" y1="-10" x2="-13" y2="-13" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
        <line x1="10" y1="10" x2="13" y2="13" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
        <line x1="-10" y1="10" x2="-13" y2="13" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
        <line x1="10" y1="-10" x2="13" y2="-13" stroke="#FFE082" stroke-width="1.8" stroke-linecap="round" />
      </g>
    </g>

    <!-- Layered 3D Cloud (Front) -->
    <g class="cloud-group" style="transform-origin: 40px 60px;">
      <!-- Cloud Shaded Bottom Extrusion -->
      <path d="M 20,62 C 16,62 14,59 14,55 C 14,50 19,47 25,47 C 27,42 33,40 38,43 C 43,43 47,46 47,51 C 47,55 43,62 36,62 Z" fill="rgba(2, 132, 199, 0.5)" />
      
      <!-- Cloud Top Highlight Face -->
      <path d="M 20,59 C 16,59 14,56 14,52 C 14,47 19,44 25,44 C 27,39 33,37 38,40 C 43,40 47,43 47,48 C 47,52 43,59 36,59 Z" fill="#ffffff" fill-opacity="0.95" filter="url(#glow)" />
    </g>

    <!-- Animated Rain Drops (falling from cloud) -->
    <g>
      <animate attributeName="opacity" values="0; 1; 0" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="-2,-6; 2,8" dur="2s" repeatCount="indefinite" />
      <!-- Rain line 1 -->
      <line x1="26" y1="65" x2="23" y2="72" stroke="#33CCFF" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)" />
      <!-- Rain line 2 -->
      <line x1="36" y1="65" x2="33" y2="72" stroke="#33CCFF" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)" />
    </g>
  </g>

  <!-- Right Column Bottom: Tech Stack Pills -->
  <foreignObject x="545" y="210" width="280" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    ">
      <span class="tech-pill">React</span>
      <span class="tech-pill">Vite</span>
      <span class="tech-pill">OpenWeather API</span>
      <span class="tech-pill">CSS Grid</span>
      <span class="tech-pill">HSL Gradients</span>
    </div>
  </foreignObject>
</svg>
