<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 140" width="100%" height="140">
  <defs>
    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Theme Gradients -->
    <linearGradient id="theme-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <!-- Node Gradient -->
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141226" />
      <stop offset="100%" stop-color="#0f0d1e" />
    </linearGradient>
  </defs>

  <style>
    .card-border {
      fill: #0c0b16;
      stroke: #221e3f;
      stroke-width: 1.5;
      rx: 16;
      transition: all 0.3s ease;
    }
    .card-border:hover {
      stroke: #6366F1;
    }
    .node-rect {
      fill: url(#node-grad);
      stroke: #221e3f;
      stroke-width: 1.2;
      rx: 10;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .badge-rect {
      fill: rgba(99, 102, 241, 0.1);
      stroke: rgba(99, 102, 241, 0.3);
      stroke-width: 1;
      rx: 4;
      transition: all 0.25s ease;
    }
    .badge-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 8.5px;
      font-weight: 800;
      fill: #6366F1;
      transition: all 0.25s ease;
    }
    .text-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      fill: #ffffff;
      transition: all 0.25s ease;
    }
    .text-desc {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 9px;
      fill: #8b949e;
      transition: all 0.25s ease;
    }
    .node-group {
      cursor: pointer;
    }
    .node-group:hover .node-rect {
      stroke: #6366F1;
      stroke-width: 1.4;
      fill: #1b1836;
      filter: drop-shadow(0 2px 5px rgba(99, 102, 241, 0.2));
    }
    .node-group:hover .badge-rect {
      fill: #6366F1;
      stroke: #A855F7;
    }
    .node-group:hover .badge-text {
      fill: #0c0b16;
    }
    .node-group:hover .text-title {
      fill: #6366F1;
    }
    .node-group:hover .text-desc {
      fill: #c9d1d9;
    }
    .flow-line {
      stroke: #221e3f;
      stroke-width: 2;
      stroke-linecap: round;
    }
    .flow-dot {
      fill: #6366F1;
    }
    .section-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 9.5px;
      font-weight: 800;
      fill: #6366F1;
      letter-spacing: 1.5px;
    }
  </style>

  <!-- Card Background -->
  <rect width="848" height="138" x="1" y="1" class="card-border" />

  <!-- Section Label -->
  <text x="30" y="26" class="section-label">HOW PORTFOLIO WORKS (FASTAPI / GROQ AI CHAT)</text>

  <!-- ==================== CONNECTOR LINES & ANIMATED FLOW ==================== -->
  <!-- Connector 1 -> 2 -->
  <line x1="195" y1="78" x2="235" y2="78" class="flow-line" stroke-dasharray="4 4" />
  <circle cx="195" cy="78" r="3" class="flow-dot" filter="url(#glow)">
    <animate attributeName="cx" from="195" to="235" dur="1.8s" repeatCount="indefinite" />
  </circle>

  <!-- Connector 2 -> 3 -->
  <line x1="400" y1="78" x2="440" y2="78" class="flow-line" stroke-dasharray="4 4" />
  <circle cx="400" cy="78" r="3" class="flow-dot" filter="url(#glow)">
    <animate attributeName="cx" from="400" to="440" dur="1.8s" repeatCount="indefinite" />
  </circle>

  <!-- Connector 3 -> 4 -->
  <line x1="605" y1="78" x2="645" y2="78" class="flow-line" stroke-dasharray="4 4" />
  <circle cx="605" cy="78" r="3" class="flow-dot" filter="url(#glow)">
    <animate attributeName="cx" from="605" to="645" dur="1.8s" repeatCount="indefinite" />
  </circle>


  <!-- ==================== FLOW NODES ==================== -->
  
  <!-- Node 1: Parallax UI -->
  <g class="node-group">
    <rect x="30" y="42" width="165" height="72" class="node-rect" />
    <rect x="42" y="52" width="18" height="18" class="badge-rect" />
    <text x="51" y="64" text-anchor="middle" class="badge-text">01</text>
    <text x="68" y="65" class="text-title">Parallax UI</text>
    <text x="42" y="87" class="text-desc">CSS 3D perspective parallax cards</text>
    <text x="42" y="99" class="text-desc">with custom cursor sheen variables.</text>
  </g>

  <!-- Node 2: Hash Router -->
  <g class="node-group">
    <rect x="235" y="42" width="165" height="72" class="node-rect" />
    <rect x="247" y="52" width="18" height="18" class="badge-rect" />
    <text x="256" y="64" text-anchor="middle" class="badge-text">02</text>
    <text x="273" y="65" class="text-title">Hash Router</text>
    <text x="247" y="87" class="text-desc">Vanilla SPA router tracks popstate</text>
    <text x="247" y="99" class="text-desc">to deep-link blog `#blog/:id` routes.</text>
  </g>

  <!-- Node 3: Heatmap Sync -->
  <g class="node-group">
    <rect x="440" y="42" width="165" height="72" class="node-rect" />
    <rect x="452" y="52" width="18" height="18" class="badge-rect" />
    <text x="461" y="64" text-anchor="middle" class="badge-text">03</text>
    <text x="478" y="65" class="text-title">Heatmap Sync</text>
    <text x="452" y="87" class="text-desc">Asynchronously fetches GitHub API</text>
    <text x="452" y="99" class="text-desc">to populate active grid heatmaps.</text>
  </g>

  <!-- Node 4: Groq AI Assistant -->
  <g class="node-group">
    <rect x="645" y="42" width="165" height="72" class="node-rect" />
    <rect x="657" y="52" width="18" height="18" class="badge-rect" />
    <text x="666" y="64" text-anchor="middle" class="badge-text">04</text>
    <text x="683" y="65" class="text-title">Groq AI Assistant</text>
    <text x="657" y="87" class="text-desc">FastAPI + BeautifulSoup scraper +</text>
    <text x="657" y="99" class="text-desc">Groq Llama SDK chat completion.</text>
  </g>

  <!-- Floating Petals & Coding Particles Overlay (Aesthetic Theme) -->
  <g id="readme-theme-overlay" opacity="0.8">
    <!-- Cherry Blossom Petal 1 (Drifts diagonally, rotates) -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.2">
      <animateTransform attributeName="transform" type="translate" values="-20,20; 870,100" dur="18s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 2 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.18">
      <animateTransform attributeName="transform" type="translate" values="120,-10; 880,60" dur="22s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="15s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 3 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FF8DA1" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="-50,70; 830,130" dur="20s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="18s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 4 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.22">
      <animateTransform attributeName="transform" type="translate" values="280,-15; 780,120" dur="25s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="10; 730" dur="24s" repeatCount="indefinite" additive="sum" />
    </path>

    <!-- Coding Particles (HTML, JS braces, sparks) -->
    <text x="0" y="0" fill="#00F2FE" font-family="monospace" font-size="11" font-weight="bold" opacity="0.14">
      &lt;/&gt;
      <animateTransform attributeName="transform" type="translate" values="40,110; 810,15" dur="26s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360" dur="16s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#8B5CF6" font-family="monospace" font-size="13" font-weight="bold" opacity="0.12">
      {{
      <animateTransform attributeName="transform" type="translate" values="180,130; 790,30" dur="28s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#3B82F6" font-family="monospace" font-size="12" font-weight="bold" opacity="0.15">
      ( )
      <animateTransform attributeName="transform" type="translate" values="10,50; 840,5" dur="23s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="30; 390" dur="14s" repeatCount="indefinite" additive="sum" />
    </text>
    
    <!-- Coding Sparkle Dots -->
    <circle cx="0" cy="0" r="1.5" fill="#00F2FE" opacity="0.25">
      <animateTransform attributeName="transform" type="translate" values="-30,30; 860,80" dur="19s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="1.2" fill="#8B5CF6" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="140,-5; 810,110" dur="24s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
