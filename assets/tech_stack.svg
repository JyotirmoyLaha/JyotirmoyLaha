<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="350">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#00F2FE" flood-opacity="0.3" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#A855F7" flood-opacity="0.3" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#FFB7C5" flood-opacity="0.3" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feFlood flood-color="#10B981" flood-opacity="0.3" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Gradient -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141226" />
      <stop offset="100%" stop-color="#0c0b16" />
    </linearGradient>

    <!-- Section header gradients -->
    <linearGradient id="grad-lang" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="grad-front" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <linearGradient id="grad-back" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB7C5" />
      <stop offset="100%" stop-color="#FF6B8B" />
    </linearGradient>
    <linearGradient id="grad-tool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <style>
    .main-border {
      fill: #0c0b16;
      stroke: #221e3f;
      stroke-width: 1.5;
      rx: 16;
      transition: all 0.3s ease;
    }
    .main-border:hover {
      stroke: #33CCFF;
    }
    .section-card {
      fill: url(#card-bg);
      stroke: #1e1b3a;
      stroke-width: 1;
      rx: 12;
      transition: all 0.3s ease;
    }
    .section-card:hover {
      stroke: #33CCFF;
      filter: drop-shadow(0 0 6px rgba(51, 204, 255, 0.15));
    }
    .title-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: 2px;
    }
    .section-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.5px;
    }
    .tech-pill-bg {
      rx: 6;
      ry: 6;
      stroke-width: 1;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tech-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: 700;
      transition: all 0.25s ease;
    }
    .pill-group {
      cursor: pointer;
    }
    .pill-group:hover .tech-pill-bg {
      stroke-width: 1.5;
      filter: drop-shadow(0 1px 4px rgba(255,255,255,0.1));
    }
    .pill-group:hover .tech-label {
      fill: #ffffff !important;
    }
    .dot-accent {
      transition: all 0.3s ease;
    }
    .section-icon {
      font-size: 13px;
    }
  </style>

  <!-- Main Card Background -->
  <rect width="848" height="348" x="1" y="1" class="main-border" />

  <!-- Title -->
  <text x="425" y="32" text-anchor="middle" class="title-text">TECH ARSENAL</text>
  <!-- Title underline accent -->
  <line x1="355" y1="40" x2="495" y2="40" stroke="url(#grad-lang)" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite" />
  </line>

  <!-- ===================== ROW 1 (Languages + Frontend) ===================== -->

  <!-- Section 1: Languages & Core -->
  <rect x="20" y="55" width="400" height="130" class="section-card" />
  <!-- Section header bar -->
  <rect x="20" y="55" width="400" height="3" rx="2" fill="url(#grad-lang)" opacity="0.7" />
  <!-- Accent dot -->
  <circle cx="38" cy="76" r="4" fill="#00F2FE" opacity="0.8" class="dot-accent" filter="url(#glow-cyan)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <text x="50" y="80" class="section-label" fill="#00F2FE">LANGUAGES &amp; CORE</text>

  <!-- Python pill -->
  <g class="pill-group" transform="translate(35, 95)">
    <rect x="0" y="0" width="80" height="28" class="tech-pill-bg" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" />
    <text x="14" y="14" font-size="14">🐍</text>
    <text x="34" y="19" class="tech-label" fill="#7dd3fc">Python</text>
  </g>

  <!-- JavaScript pill -->
  <g class="pill-group" transform="translate(125, 95)">
    <rect x="0" y="0" width="100" height="28" class="tech-pill-bg" fill="rgba(250,204,21,0.08)" stroke="rgba(250,204,21,0.25)" />
    <text x="12" y="14" font-size="13">⚡</text>
    <text x="32" y="19" class="tech-label" fill="#fde047">JavaScript</text>
  </g>

  <!-- C pill -->
  <g class="pill-group" transform="translate(235, 95)">
    <rect x="0" y="0" width="52" height="28" class="tech-pill-bg" fill="rgba(169,186,205,0.08)" stroke="rgba(169,186,205,0.25)" />
    <text x="20" y="19" class="tech-label" fill="#a9bacd" text-anchor="middle">C</text>
    <text x="35" y="19" class="tech-label" fill="#64748b">lang</text>
  </g>

  <!-- HTML5 pill -->
  <g class="pill-group" transform="translate(35, 133)">
    <rect x="0" y="0" width="76" height="28" class="tech-pill-bg" fill="rgba(228,77,38,0.08)" stroke="rgba(228,77,38,0.25)" />
    <text x="12" y="14" font-size="12">🔶</text>
    <text x="30" y="19" class="tech-label" fill="#fb923c">HTML5</text>
  </g>

  <!-- CSS3 pill -->
  <g class="pill-group" transform="translate(121, 133)">
    <rect x="0" y="0" width="68" height="28" class="tech-pill-bg" fill="rgba(21,114,182,0.08)" stroke="rgba(21,114,182,0.25)" />
    <text x="12" y="14" font-size="12">🔷</text>
    <text x="30" y="19" class="tech-label" fill="#38bdf8">CSS3</text>
  </g>

  <!-- SQL pill -->
  <g class="pill-group" transform="translate(199, 133)">
    <rect x="0" y="0" width="60" height="28" class="tech-pill-bg" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" />
    <text x="12" y="14" font-size="12">🗃️</text>
    <text x="32" y="19" class="tech-label" fill="#a5b4fc">SQL</text>
  </g>

  <!-- Git pill -->
  <g class="pill-group" transform="translate(269, 133)">
    <rect x="0" y="0" width="58" height="28" class="tech-pill-bg" fill="rgba(243,79,41,0.08)" stroke="rgba(243,79,41,0.25)" />
    <text x="12" y="14" font-size="12">🔀</text>
    <text x="30" y="19" class="tech-label" fill="#f87171">Git</text>
  </g>

  <!-- GitHub pill -->
  <g class="pill-group" transform="translate(337, 133)">
    <rect x="0" y="0" width="76" height="28" class="tech-pill-bg" fill="rgba(139,148,158,0.08)" stroke="rgba(139,148,158,0.25)" />
    <text x="12" y="14" font-size="12">🐙</text>
    <text x="30" y="19" class="tech-label" fill="#c9d1d9">GitHub</text>
  </g>

  <!-- ============================================================ -->

  <!-- Section 2: Frontend & UI -->
  <rect x="430" y="55" width="400" height="130" class="section-card" />
  <rect x="430" y="55" width="400" height="3" rx="2" fill="url(#grad-front)" opacity="0.7" />
  <circle cx="448" cy="76" r="4" fill="#A855F7" opacity="0.8" class="dot-accent" filter="url(#glow-purple)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <text x="460" y="80" class="section-label" fill="#A855F7">FRONTEND &amp; MOBILE</text>

  <!-- Tailwind CSS pill -->
  <g class="pill-group" transform="translate(445, 95)">
    <rect x="0" y="0" width="108" height="28" class="tech-pill-bg" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" />
    <text x="12" y="14" font-size="12">💨</text>
    <text x="30" y="19" class="tech-label" fill="#22d3ee">Tailwind CSS</text>
  </g>

  <!-- React Native pill -->
  <g class="pill-group" transform="translate(563, 95)">
    <rect x="0" y="0" width="112" height="28" class="tech-pill-bg" fill="rgba(97,218,251,0.08)" stroke="rgba(97,218,251,0.25)" />
    <text x="12" y="14" font-size="12">⚛️</text>
    <text x="32" y="19" class="tech-label" fill="#61dafb">React Native</text>
  </g>

  <!-- Expo pill -->
  <g class="pill-group" transform="translate(685, 95)">
    <rect x="0" y="0" width="68" height="28" class="tech-pill-bg" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" />
    <text x="12" y="14" font-size="12">📱</text>
    <text x="30" y="19" class="tech-label" fill="#e2e8f0">Expo</text>
  </g>

  <!-- Responsive Design pill -->
  <g class="pill-group" transform="translate(445, 133)">
    <rect x="0" y="0" width="130" height="28" class="tech-pill-bg" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.25)" />
    <text x="12" y="14" font-size="12">📐</text>
    <text x="30" y="19" class="tech-label" fill="#c084fc">Responsive Design</text>
  </g>

  <!-- REST APIs pill -->
  <g class="pill-group" transform="translate(585, 133)">
    <rect x="0" y="0" width="92" height="28" class="tech-pill-bg" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" />
    <text x="12" y="14" font-size="12">🔌</text>
    <text x="30" y="19" class="tech-label" fill="#a5b4fc">REST APIs</text>
  </g>

  <!-- ===================== ROW 2 (Backend + Tools) ===================== -->

  <!-- Section 3: Backend & Data -->
  <rect x="20" y="200" width="400" height="130" class="section-card" />
  <rect x="20" y="200" width="400" height="3" rx="2" fill="url(#grad-back)" opacity="0.7" />
  <circle cx="38" cy="221" r="4" fill="#FFB7C5" opacity="0.8" class="dot-accent" filter="url(#glow-pink)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" repeatCount="indefinite" />
  </circle>
  <text x="50" y="225" class="section-label" fill="#FFB7C5">BACKEND &amp; DATA</text>

  <!-- Flask pill -->
  <g class="pill-group" transform="translate(35, 240)">
    <rect x="0" y="0" width="68" height="28" class="tech-pill-bg" fill="rgba(255,183,197,0.08)" stroke="rgba(255,183,197,0.25)" />
    <text x="12" y="14" font-size="12">🧪</text>
    <text x="30" y="19" class="tech-label" fill="#FFB7C5">Flask</text>
  </g>

  <!-- FastAPI pill -->
  <g class="pill-group" transform="translate(113, 240)">
    <rect x="0" y="0" width="82" height="28" class="tech-pill-bg" fill="rgba(4,150,136,0.08)" stroke="rgba(4,150,136,0.25)" />
    <text x="12" y="14" font-size="12">⚡</text>
    <text x="30" y="19" class="tech-label" fill="#2dd4bf">FastAPI</text>
  </g>

  <!-- Firebase pill -->
  <g class="pill-group" transform="translate(205, 240)">
    <rect x="0" y="0" width="84" height="28" class="tech-pill-bg" fill="rgba(255,160,0,0.08)" stroke="rgba(255,160,0,0.25)" />
    <text x="12" y="14" font-size="12">🔥</text>
    <text x="30" y="19" class="tech-label" fill="#fbbf24">Firebase</text>
  </g>

  <!-- Firestore pill -->
  <g class="pill-group" transform="translate(299, 240)">
    <rect x="0" y="0" width="88" height="28" class="tech-pill-bg" fill="rgba(255,202,40,0.08)" stroke="rgba(255,202,40,0.25)" />
    <text x="12" y="14" font-size="12">📄</text>
    <text x="30" y="19" class="tech-label" fill="#fde68a">Firestore</text>
  </g>

  <!-- pdfplumber pill -->
  <g class="pill-group" transform="translate(35, 278)">
    <rect x="0" y="0" width="96" height="28" class="tech-pill-bg" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.25)" />
    <text x="12" y="14" font-size="12">📑</text>
    <text x="30" y="19" class="tech-label" fill="#fca5a5">pdfplumber</text>
  </g>

  <!-- Groq AI pill -->
  <g class="pill-group" transform="translate(141, 278)">
    <rect x="0" y="0" width="82" height="28" class="tech-pill-bg" fill="rgba(244,114,182,0.08)" stroke="rgba(244,114,182,0.25)" />
    <text x="12" y="14" font-size="12">🤖</text>
    <text x="30" y="19" class="tech-label" fill="#f9a8d4">Groq AI</text>
  </g>

  <!-- OAuth pill -->
  <g class="pill-group" transform="translate(233, 278)">
    <rect x="0" y="0" width="70" height="28" class="tech-pill-bg" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.25)" />
    <text x="12" y="14" font-size="12">🔐</text>
    <text x="30" y="19" class="tech-label" fill="#fde68a">OAuth</text>
  </g>

  <!-- ============================================================ -->

  <!-- Section 4: Tools & DevOps -->
  <rect x="430" y="200" width="400" height="130" class="section-card" />
  <rect x="430" y="200" width="400" height="3" rx="2" fill="url(#grad-tool)" opacity="0.7" />
  <circle cx="448" cy="221" r="4" fill="#10B981" opacity="0.8" class="dot-accent" filter="url(#glow-green)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite" />
  </circle>
  <text x="460" y="225" class="section-label" fill="#10B981">TOOLS &amp; DEPLOYMENT</text>

  <!-- Postman pill -->
  <g class="pill-group" transform="translate(445, 240)">
    <rect x="0" y="0" width="90" height="28" class="tech-pill-bg" fill="rgba(255,108,55,0.08)" stroke="rgba(255,108,55,0.25)" />
    <text x="12" y="14" font-size="12">🧭</text>
    <text x="30" y="19" class="tech-label" fill="#fb923c">Postman</text>
  </g>

  <!-- Render pill -->
  <g class="pill-group" transform="translate(545, 240)">
    <rect x="0" y="0" width="78" height="28" class="tech-pill-bg" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" />
    <text x="12" y="14" font-size="12">☁️</text>
    <text x="30" y="19" class="tech-label" fill="#a5b4fc">Render</text>
  </g>

  <!-- Netlify pill -->
  <g class="pill-group" transform="translate(633, 240)">
    <rect x="0" y="0" width="80" height="28" class="tech-pill-bg" fill="rgba(0,200,172,0.08)" stroke="rgba(0,200,172,0.25)" />
    <text x="12" y="14" font-size="12">🌐</text>
    <text x="30" y="19" class="tech-label" fill="#34d399">Netlify</text>
  </g>

  <!-- Gunicorn pill -->
  <g class="pill-group" transform="translate(445, 278)">
    <rect x="0" y="0" width="90" height="28" class="tech-pill-bg" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" />
    <text x="12" y="14" font-size="12">🦄</text>
    <text x="30" y="19" class="tech-label" fill="#6ee7b7">Gunicorn</text>
  </g>

  <!-- Uvicorn pill -->
  <g class="pill-group" transform="translate(545, 278)">
    <rect x="0" y="0" width="84" height="28" class="tech-pill-bg" fill="rgba(45,212,191,0.08)" stroke="rgba(45,212,191,0.25)" />
    <text x="12" y="14" font-size="12">⚙️</text>
    <text x="30" y="19" class="tech-label" fill="#5eead4">Uvicorn</text>
  </g>

  <!-- BeautifulSoup pill -->
  <g class="pill-group" transform="translate(639, 278)">
    <rect x="0" y="0" width="116" height="28" class="tech-pill-bg" fill="rgba(134,239,172,0.08)" stroke="rgba(134,239,172,0.25)" />
    <text x="12" y="14" font-size="12">🍲</text>
    <text x="30" y="19" class="tech-label" fill="#86efac">BeautifulSoup</text>
  </g>


  <!-- =================== FLOATING PARTICLES OVERLAY =================== -->
  <g id="readme-theme-overlay" opacity="0.8">
    <!-- Cherry Blossom Petal 1 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.2">
      <animateTransform attributeName="transform" type="translate" values="-20,40; 870,200" dur="18s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 2 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.18">
      <animateTransform attributeName="transform" type="translate" values="120,-20; 880,110" dur="22s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="15s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 3 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FF8DA1" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="-50,160; 830,320" dur="20s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="90; 450" dur="18s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- Cherry Blossom Petal 4 -->
    <path d="M 0,0 C -3,-5 -8,-3 -7,2 C -5,7 0,10 0,10 C 0,10 5,7 7,2 C 8,-3 3,-5 0,0 Z" fill="#FFB7C5" opacity="0.22">
      <animateTransform attributeName="transform" type="translate" values="280,-30; 780,300" dur="25s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="10; 730" dur="24s" repeatCount="indefinite" additive="sum" />
    </path>

    <!-- Coding Particles -->
    <text x="0" y="0" fill="#00F2FE" font-family="monospace" font-size="11" font-weight="bold" opacity="0.14">
      &lt;/&gt;
      <animateTransform attributeName="transform" type="translate" values="40,280; 810,30" dur="26s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360" dur="16s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#8B5CF6" font-family="monospace" font-size="13" font-weight="bold" opacity="0.12">
      {{
      <animateTransform attributeName="transform" type="translate" values="180,330; 790,60" dur="28s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite" additive="sum" />
    </text>
    <text x="0" y="0" fill="#3B82F6" font-family="monospace" font-size="12" font-weight="bold" opacity="0.15">
      ( )
      <animateTransform attributeName="transform" type="translate" values="10,120; 840,10" dur="23s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="30; 390" dur="14s" repeatCount="indefinite" additive="sum" />
    </text>

    <!-- Sparkle Dots -->
    <circle cx="0" cy="0" r="1.5" fill="#00F2FE" opacity="0.25">
      <animateTransform attributeName="transform" type="translate" values="-30,80; 860,200" dur="19s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="1.2" fill="#8B5CF6" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="140,-10; 810,260" dur="24s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
