<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 316" width="100%" height="316">
  <style>
    .table-bg {
      fill: #0d1117;
    }
    .grid-line {
      stroke: #30363d;
      stroke-width: 1;
    }
    .header-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: #8b949e;
      letter-spacing: 0.5px;
    }
    .category-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #c9d1d9;
    }
    .pill-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 9px;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }
    .tech-pill {
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), filter 0.2s ease;
    }
    .tech-pill:hover {
      transform: scale(1.08) translateY(-1px);
      filter: drop-shadow(0 2px 6px rgba(255, 255, 255, 0.25));
    }
  </style>

  <!-- Table Body Background -->
