<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 150" width="100%" height="150">
  <style>
    .banner-bg {
      fill: #060913;
    }
    .grid-line {
      stroke: #1e293b;
      stroke-width: 1;
    }
    .category-text {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, monospace;
      font-weight: 700;
      font-size: 10px;
      fill: #64748b;
      letter-spacing: 1.5px;
    }
    .pill-bg {
      fill: #0b1120;
      stroke: #1e293b;
      stroke-width: 1;
      transition: stroke 0.2s ease, fill 0.2s ease;
    }
    .pill-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 11px;
    }
    .tech-pill {
      cursor: pointer;
    }
    .tech-pill:hover .pill-bg {
      stroke: #475569;
      fill: #0f172a;
    }
  </style>

  <!-- Background Card -->
  <rect width="850" height="150" rx="8" class="banner-bg" stroke="#1e293b" stroke-width="1" />

  <!-- Vertical Divider Line -->
  <line x1="110" y1="0" x2="110" y2="150" class="grid-line" />

  <!-- Horizontal Grid Lines -->
  <line x1="0" y1="50" x2="850" y2="50" class="grid-line" />
  <line x1="0" y1="100" x2="850" y2="100" class="grid-line" />

  <!-- ===================== ROW 1: FRONTEND ===================== -->
  <!-- Category -->
  <circle cx="16" cy="25" r="3" fill="#00F2FE" />
  <text x="28" y="29" class="category-text">FRONTEND</text>

  <!-- React -->
  <g class="tech-pill" transform="translate(125, 12)">
    <rect width="62" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#00F2FE" />
    <text x="14" y="17" class="pill-text" fill="#38BDF8">React</text>
  </g>

  <!-- TypeScript -->
  <g class="tech-pill" transform="translate(195, 12)">
    <rect width="90" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#38BDF8" />
    <text x="14" y="17" class="pill-text" fill="#93C5FD">TypeScript</text>
  </g>

  <!-- Vite -->
  <g class="tech-pill" transform="translate(293, 12)">
    <rect width="52" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#A855F7" />
    <text x="14" y="17" class="pill-text" fill="#C084FC">Vite</text>
  </g>

  <!-- Tailwind CSS -->
  <g class="tech-pill" transform="translate(353, 12)">
    <rect width="104" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#00F2FE" />
    <text x="14" y="17" class="pill-text" fill="#38BDF8">Tailwind CSS</text>
  </g>

  <!-- Three.js -->
  <g class="tech-pill" transform="translate(465, 12)">
    <rect width="76" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#FFFFFF" />
    <text x="14" y="17" class="pill-text" fill="#FDE047">Three.js</text>
  </g>

  <!-- Framer Motion -->
  <g class="tech-pill" transform="translate(549, 12)">
    <rect width="108" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#F43F5E" />
    <text x="14" y="17" class="pill-text" fill="#FDA4AF">Framer Motion</text>
  </g>

  <!-- Lenis & AOS -->
  <g class="tech-pill" transform="translate(665, 12)">
    <rect width="96" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#10B981" />
    <text x="14" y="17" class="pill-text" fill="#34D399">Lenis &amp; AOS</text>
  </g>


  <!-- ===================== ROW 2: BACKEND ===================== -->
  <!-- Category -->
  <circle cx="16" cy="75" r="3" fill="#A855F7" />
  <text x="28" y="79" class="category-text">BACKEND</text>

  <!-- Python 3 -->
  <g class="tech-pill" transform="translate(125, 62)">
    <rect width="76" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#38BDF8" />
    <text x="14" y="17" class="pill-text" fill="#60A5FA">Python 3</text>
  </g>

  <!-- FastAPI -->
  <g class="tech-pill" transform="translate(209, 62)">
    <rect width="72" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#10B981" />
    <text x="14" y="17" class="pill-text" fill="#34D399">FastAPI</text>
  </g>

  <!-- SQLAlchemy -->
  <g class="tech-pill" transform="translate(289, 62)">
    <rect width="94" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#EF4444" />
    <text x="14" y="17" class="pill-text" fill="#FCA5A5">SQLAlchemy</text>
  </g>

  <!-- Groq AI -->
  <g class="tech-pill" transform="translate(391, 62)">
    <rect width="74" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#EC4899" />
    <text x="14" y="17" class="pill-text" fill="#FBCFE8">Groq AI</text>
  </g>


  <!-- ===================== ROW 3: CLI ===================== -->
  <!-- Category -->
  <circle cx="16" cy="125" r="3" fill="#EAB308" />
  <text x="28" y="129" class="category-text">CLI</text>

  <!-- Node.js -->
  <g class="tech-pill" transform="translate(125, 112)">
    <rect width="72" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#84CC16" />
    <text x="14" y="17" class="pill-text" fill="#A3E635">Node.js</text>
  </g>

  <!-- NPM -->
  <g class="tech-pill" transform="translate(205, 112)">
    <rect width="50" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#EF4444" />
    <text x="14" y="17" class="pill-text" fill="#FCA5A5">NPM</text>
  </g>

  <!-- ANSI FX -->
  <g class="tech-pill" transform="translate(263, 112)">
    <rect width="74" height="26" rx="5" class="pill-bg" />
    <path d="M 5,0 A 5,5 0 0 0 0,5 L 0,21 A 5,5 0 0 0 5,26 L 5,0 Z" fill="#A855F7" />
    <text x="14" y="17" class="pill-text" fill="#C084FC">ANSI FX</text>
  </g>


  <!-- =================== FUTURISTIC SCHEMATIC ON THE RIGHT =================== -->
  <g stroke="#1e293b" stroke-width="1.2" fill="none" opacity="0.65" transform="translate(10, 0)">
    <!-- Top trace with purple node -->
    <path d="M 790,25 L 815,25 L 825,35 L 825,75" />
    <!-- Middle trace with green node -->
    <path d="M 775,60 L 795,60 L 805,70 L 805,110 L 790,125 L 775,125" />
    <!-- Outer trace -->
    <path d="M 825,65 L 835,75 L 835,135 L 815,135" />
    <!-- Connector dots -->
    <circle cx="795" cy="60" r="3" fill="#10B981" stroke="none" />
    <circle cx="815" cy="25" r="3" fill="#A855F7" stroke="none" />
  </g>

</svg>
